[tools]
rust = "latest"
uv = "latest"
node = "lts"
bun = "latest"
yazi = "latest"
zellij = "latest"
zoxide = "latest"
helix = "latest"
vivid = "latest"
gemini = "latest"
glab = "latest"
typst = "latest"
ast-grep = "latest"
