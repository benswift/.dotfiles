ty = "latest"
marksman = "latest"
rclone = "latest"
"cargo:mergiraf" = "latest"
"cargo:oxipng" = "latest"
"cargo:tex-fmt" = "latest"
"cargo:kdlfmt" = "latest"
flyctl = "latest"
oxfmt = "latest"
typstyle = "latest"
tree-sitter = "latest"

[settings]
idiomatic_version_file_enable_tools = ["[]"]
