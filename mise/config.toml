[tools]
rust = "latest"
uv = "latest"
node = "lts"
bun = "latest"
yazi = "latest"
zellij = "latest"
zoxide = "latest"
helix = "latest"
vivid = "latest"
gemini = "latest"
codex = "latest"
glab = "latest"
typst = "latest"
ast-grep = "latest"
jq = "latest"
fd = "latest"
# bin/zj-switch's picker. Via mise rather than apt/brew so both platforms get
# the same (and a current) fzf --- Debian ships 0.44, from 2023.
fzf = "latest"
# bin/ts-cat's fallback previewer. Via mise rather than brew/apt so the binary
# is called `bat` on both platforms (Debian's package installs it as `batcat`).
bat = "latest"
# bin/ts-cat's highlighter (tree-sitter with nvim-treesitter queries; WASM
# parsers cached in ~/.local/share/lumis by bin/lumis-parsers). Release tags
# are cargo-lumis-cli/vX.Y.Z, which the github backend resolves fine.
"github:leandrocp/lumis" = "latest"
# Editor tooling invoked as bare binaries (helix LSP/formatters and the
# bin/claude-format hook), never via `uv run`, so they must be on PATH globally.
ruff = "latest"
ty = "latest"
marksman = "latest"
rclone = "latest"
# mergiraf is Codeberg-only (no GitHub releases, not in mise's registry), so
# it's the one formatter here with no cross-platform prebuilt binary --- cargo
# compiles it everywhere. The rest below pull prebuilt release binaries.
"cargo:mergiraf" = "latest"
oxipng = "latest"
"github:WGUNDERWOOD/tex-fmt" = { version = "latest", exe = "tex-fmt" }
"github:hougesen/kdlfmt" = { version = "latest", exe = "kdlfmt" }
flyctl = "latest"
oxfmt = "latest"
typstyle = "latest"
# headless-terminal MCP server (drives neomutt and other TUIs from Claude
# Code). Release ships bare per-target binaries, so pin the exe name.
"github:memextech/ht-mcp" = { version = "latest", exe = "ht-mcp" }
# linting for this repo's own bash scripts (bin/*, lib/*)
shellcheck = "latest"
# bin/check-secrets' scanner
gitleaks = "latest"

[settings]
idiomatic_version_file_enable_tools = []
