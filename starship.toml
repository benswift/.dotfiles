# Starship prompt with catppuccin mocha colours

# Catppuccin mocha palette:
# text: #cdd6f4, base: #1e1e2e
# red: #f38ba8, green: #a6e3a1, yellow: #f9e2af
# blue: #89b4fa, mauve: #cba6f7, teal: #94e2d5, peach: #fab387

format = """
$time\
$hostname\
$directory\
$git_branch\
$python\
$elixir\
$nodejs\
$rust\
$cmd_duration\
$character"""

[directory]
style = "bold #89b4fa"
truncation_length = 3

[git_branch]
style = "bold #cba6f7"
format = "[$branch]($style) "

[python]
style = "#f9e2af"
format = "[py $version]($style) "

[elixir]
disabled = true

[nodejs]
style = "#a6e3a1"
format = "[node $version]($style) "

[rust]
style = "#fab387"
format = "[rs $version]($style) "

[time]
disabled = false
style = "#a6adc8"
format = "[$time]($style) "
time_format = "%H:%M"

[hostname]
ssh_only = true
style = "bold #fab387"
format = "[$hostname]($style) "

[cmd_duration]
min_time = 2000
style = "#f9e2af"
format = "[took $duration]($style) "

[character]
success_symbol = "[❯](bold #a6e3a1)"
error_symbol = "[❯](bold #f38ba8)"
