[[language]]
name = "python"
language-servers = ["ruff", "ty"]
auto-format = true

[language-server.ruff]
command = "ruff"
args = ["server"]

[language-server.ty]
command = "ty"
args = ["server"]

[[language]]
name = "elixir"
language-servers = ["elixir-ls"]
auto-format = true

[[language]]
name = "heex"
language-servers = ["elixir-ls"]
auto-format = true

[language-server.elixir-ls]
command = "elixir-ls"

[language-server.nb-lsp]
command = "nb-lsp"

# harper-ls: grammar checker for prose (disabled by default---too noisy)
# to enable, add "harper-ls" to language-servers below and uncomment:
# [language-server.harper-ls]
# command = "harper-ls"
# args = ["--stdio"]
# [language-server.harper-ls.config.harper-ls]
# dialect = "Australian"

# astromotion decks: skip auto-format because prettier/oxfmt mangle multi-line
# MDX expression containers like `{/* notes: ...\n<ol>...</ol>\n*/}` (the
# leading `*` gets escaped to `\*` and a blank line is inserted before the
# content). Single-line `{/* _class: hero */}` survives correctly *if* oxfmt
# is told the file is .mdx (see the dedicated mdx rule below), but multi-line
# cases are a known prettier behaviour, so we just skip auto-format here.
# Covers both parent decks (`*.deck.mdx`, routed by astromotion) and partials
# (`*.mdx` files under any `decks/` subtree, included via `@include`).
# Highlighting/injections inherit from markdown via
# ~/.config/helix/runtime/queries/astromotion-deck/
[[language]]
name = "astromotion-deck"
scope = "source.markdown"
grammar = "markdown"
language-servers = ["marksman", "nb-lsp"]
file-types = [{ glob = "*.deck.mdx" }, { glob = "**/decks/**/*.mdx" }]
auto-format = false

# mdx: separate from markdown so oxfmt sees the .mdx extension via
# --stdin-filepath and uses its MDX parser. Without this, oxfmt treats MDX
# expression containers as markdown emphasis and mangles single-line MDX
# comments like `{/* _class: hero */}`.
[[language]]
name = "mdx"
scope = "source.markdown"
grammar = "markdown"
language-servers = ["marksman", "nb-lsp"]
auto-format = true
file-types = ["mdx"]
formatter = { command = "oxfmt-helix", args = ["--stdin-filepath", "file.mdx"] }

[[language]]
name = "markdown"
language-servers = ["marksman", "nb-lsp"]
auto-format = true
file-types = [
  "md",
  "markdown",
  "mkd",
  "mkdn",
  "mdwn",
  "mdown",
  "markdn",
  "mdtxt",
  "mdtext",
  "workbook",
  { glob = "PULLREQ_EDITMSG" },
  { glob = "*.deck.svx" },
]
formatter = { command = "oxfmt-helix", args = ["--stdin-filepath", "file.md"] }

[[language]]
name = "latex"
auto-format = true
formatter = { command = "tex-fmt", args = ["--stdin"] }

[[language]]
name = "typst"
auto-format = true
formatter = { command = "typstyle", args = ["--wrap-text"] }

[[language]]
name = "toml"
auto-format = true
formatter = { command = "oxfmt-helix", args = [
  "--stdin-filepath",
  "file.toml",
] }

[[language]]
name = "kdl"
auto-format = true
formatter = { command = "kdlfmt", args = ["format", "-"] }

[language-server.mutt-compose-lsp]
command = "mutt-compose-lsp"

[[language]]
name = "mutt-compose"
scope = "text.mutt-compose"
language-servers = ["mutt-compose-lsp"]
file-types = [{ glob = "neomutt-*" }]
text-width = 72
soft-wrap.enable = true

[[language]]
name = "muttrc"
scope = "source.muttrc"
file-types = ["muttrc", { glob = "*muttrc" }]

[[language]]
name = "extempore"
scope = "source.extempore"
file-types = ["xtm"]
comment-token = ";"
block-comment-tokens = { start = "#|", end = "|#" }
indent = { tab-width = 2, unit = "  " }

[[grammar]]
name = "extempore"
source = { git = "https://github.com/extemporelang/tree-sitter-extempore", rev = "8a8a878" }

[[grammar]]
name = "mutt-compose"
source = { git = "https://github.com/benswift/tree-sitter-mutt-compose", rev = "c0558cc601b8407fe84907f230a7595fdece1836" }

[[grammar]]
name = "muttrc"
source = { git = "https://github.com/benswift/tree-sitter-muttrc", rev = "f75f401f7584bcb44f6bdca96b1419b7ccc4331c" }
